<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean User Data</title>

  <!-- Tailwind CSS (for styling) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Connect JavaScript -->
  <script defer src="./main.js"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

  <main class="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8 space-y-6">

    <h1 class="text-3xl font-bold text-slate-800">
      Clean User Data
    </h1>

    <p class="text-slate-500">
      Paste messy input and clean it using JavaScript
    </p>

    <!-- Example buttons -->
    <div class="space-y-2">
      <p class="text-sm text-slate-500">Examples (click to use):</p>

      <div class="flex flex-wrap gap-2">

        <button
          class="exampleBtn px-3 py-1 rounded-lg bg-slate-200 hover:bg-slate-300 text-sm"
          data-value=" NAVN: Peter Hansen ; ALDER: 7 ; EMAIL: PETER.HANSEN@EMAIL.COM ; BY: Odense "
        >
          Example 1
        </button>

        <button
          class="exampleBtn px-3 py-1 rounded-lg bg-slate-200 hover:bg-slate-300 text-sm"
          data-value=" NAVN: Anna Jensen ; ALDER: 003 ; EMAIL: ANNA.JENSEN@GMAIL.COM ; BY: Aarhus "
        >
          Example 2
        </button>

        <button
          class="exampleBtn px-3 py-1 rounded-lg bg-slate-200 hover:bg-slate-300 text-sm"
          data-value=" NAVN: Lars Hansen ; ALDER: xx19xx ; EMAIL: LARS@@MAIL..COM ; BY: Kolding "
        >
          Example 3
        </button>

      </div>
    </div>

    <!-- Input field -->
    <textarea
      id="inputField"
      rows="5"
      class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-sky-400"
      placeholder="Paste messy input here..."
    ></textarea>

    <!-- Clean button -->
    <button
      id="cleanBtn"
      class="w-full rounded-xl bg-sky-500 text-white font-medium px-4 py-3 hover:bg-sky-600 transition"
    >
      Clean Data
    </button>

    <!-- Output -->
    <pre
      id="output"
      class="rounded-xl bg-slate-900 text-slate-100 p-4 text-sm overflow-x-auto whitespace-pre-wrap"
    >
Result will appear here...
    </pre>

  </main>

</body>
</html>
