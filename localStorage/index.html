<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Storage Practice</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="./main.js"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <main class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8 space-y-8">
    <section>
      <h1 class="text-3xl font-bold text-slate-800 mb-2">Web Storage + Clean Data</h1>
      <p class="text-slate-500">
        Clean user input and save it in localStorage or sessionStorage
      </p>
    </section>

    <section class="space-y-4">
      <h2 class="text-xl font-semibold text-slate-800">1. Simple Storage</h2>

      <input
        id="nameInput"
        type="text"
        placeholder="Enter your name"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-sky-400"
      />

      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <button id="saveBtn" class="rounded-xl bg-sky-500 text-white px-4 py-3 hover:bg-sky-600 transition">Save Local</button>
        <button id="loadBtn" class="rounded-xl bg-emerald-500 text-white px-4 py-3 hover:bg-emerald-600 transition">Load Local</button>
        <button id="deleteBtn" class="rounded-xl bg-rose-500 text-white px-4 py-3 hover:bg-rose-600 transition">Delete Local</button>
        <button id="sessionBtn" class="rounded-xl bg-amber-500 text-white px-4 py-3 hover:bg-amber-600 transition">Save Session</button>
        <button id="deleteSessionBtn" class="rounded-xl bg-purple-500 text-white px-4 py-3 hover:bg-purple-600 transition">Delete Session</button>
        <button id="addListBtn" class="rounded-xl bg-slate-800 text-white px-4 py-3 hover:bg-slate-900 transition">Add to List</button>
      </div>

      <div id="result" class="rounded-xl bg-slate-50 border border-slate-200 px-4 py-3 text-slate-700 min-h-[56px] flex items-center">
        Result will appear here...
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <h3 class="font-semibold text-slate-800 mb-2">Local Storage</h3>
          <p id="localDisplay" class="text-slate-600">LocalStorage: empty</p>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <h3 class="font-semibold text-slate-800 mb-2">Session Storage</h3>
          <p id="sessionDisplay" class="text-slate-600">SessionStorage: empty</p>
        </div>
      </div>

      <div>
        <h3 class="text-lg font-semibold text-slate-800 mb-3">Saved Names List</h3>
        <ul id="nameList" class="space-y-2"></ul>
      </div>
    </section>

    <section class="space-y-4 border-t border-slate-200 pt-8">
      <h2 class="text-xl font-semibold text-slate-800">2. Clean User Data Task</h2>

      <textarea
        id="rawInput"
        rows="5"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-sky-400"
        placeholder='Example: NAVN: Peter Hansen ; ALDER: 7 ; EMAIL: PETER.HANSEN@EMAIL.COM ; BY: Odense'
      ></textarea>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <button id="cleanBtn" class="rounded-xl bg-indigo-500 text-white px-4 py-3 hover:bg-indigo-600 transition">
          Clean Data
        </button>

        <button id="saveCleanLocalBtn" class="rounded-xl bg-teal-500 text-white px-4 py-3 hover:bg-teal-600 transition">
          Save Cleaned to Local
        </button>

        <button id="saveCleanSessionBtn" class="rounded-xl bg-orange-500 text-white px-4 py-3 hover:bg-orange-600 transition">
          Save Cleaned to Session
        </button>
      </div>

      <pre id="cleanResult" class="rounded-xl bg-slate-900 text-slate-100 p-4 overflow-x-auto text-sm whitespace-pre-wrap">Cleaned object will appear here...</pre>
    </section>
  </main>
</body>
</html>
